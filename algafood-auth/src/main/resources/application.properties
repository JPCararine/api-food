spring.application.name=algafood-auth

spring.datasource.url=jdbc:mysql://localhost:3306/algafood?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mysql
spring.web.error.include-stacktrace=never

spring.data.redis.host=localhost
spring.data.redis.port=6379

algafood.jwt.keystore.path=keystores/algafood.jks
algafood.jwt.keystore.password=${KEYSTORE_PASSWORD}
algafood.jwt.keystore.keypair-alias=algafood

spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.deserialization.fail-on-ignored-properties=true

server.port=8081
